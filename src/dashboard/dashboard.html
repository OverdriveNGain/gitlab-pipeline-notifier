<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitLab+</title>
  <link rel="stylesheet" href="../common/styles.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="tabs/history/history.css">
  <link rel="stylesheet" href="tabs/reviews/reviews.css">
</head>

<body class="gl-dark">
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <img src="../../icons/icon48.png" alt="Logo" class="app-logo">
        <h1>GitLab+</h1>

        <div class="tabs-header">
          <button id="tabPipelines" class="tab-btn active">Pipelines</button>
          <button id="tabReviews" class="tab-btn">Reviews</button>
        </div>
      </div>

      <div class="header-actions">
        <button id="openFullScreenBtn" class="btn btn-secondary">Open Full Screen</button>
      </div>
    </header>

    <main id="contentPipelines" class="pipeline-list-container active-tab"></main>

    <main id="contentReviews" class="pipeline-list-container" style="display: none;"></main>
  </div>

  <script src="../common/utils.js"></script>
  <script src="../common/repository.js"></script>
  <script src="../common/badges/badge_templates.js"></script>
  <script src="../common/badges/badge_utils.js"></script>
  <script src="../common/badges/badge_renderer.js"></script>
  <script src="../common/badges/badge_row_renderer.js"></script>
  <script src="../common/info_banner_renderer.js"></script>
  <script src="tabs/history/history_renderer.js"></script>
  <script src="tabs/history/history.js"></script>
  <script src="tabs/reviews/reviews_renderer.js"></script>
  <script src="tabs/reviews/reviews.js"></script>
  <script src="dashboard.js"></script>
</body>

</html>
