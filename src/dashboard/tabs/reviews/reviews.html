<div style="display: flex; justify-content: space-between; align-items: center;">
  <div id="reviewsFilterContainer" style="margin: 0px 0 0 16px; display: flex; align-items: center; gap: 8px;">
    <select id="reviewDateFilter"
      style="background-color: var(--gl-background-color, #1f1e24); color: var(--gl-text-color); border: 1px solid var(--gl-border-color, #3a383f); border-radius: 4px; padding: 6px 28px 6px 8px; font-size: 13px; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23888%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22%3E%3Cpolyline points=%226 9 12 15 18 9%22%3E%3C/polyline%3E%3C/svg%3E'); background-repeat: no-repeat; background-position: right 8px center;">
      <option value="3_days_ago">Show logs starting from 3 days ago</option>
      <option value="custom_datetime" id="customDatetimeOption">Show logs starting from datetime X</option>
      <option value="all">Show all</option>
    </select>
    <button id="editReviewTimeBtn"
      style="background: none; border: none; color: #66b3ff; cursor: pointer; display: none; padding: 4px; border-radius: 4px; align-items: center; justify-content: center;"
      title="Edit time" onmouseover="this.style.backgroundColor='rgba(102, 179, 255, 0.1)';"
      onmouseout="this.style.backgroundColor='transparent';">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    </button>
  </div>
  <div id="reviewsBannerContainer" style="flex: 1;"></div>
</div>
<div id="reviewsContainer"></div>
